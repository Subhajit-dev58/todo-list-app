
<!DOCTYPE html>

<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Todo List App</title>

<link rel="stylesheet" href="style.css">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

</head>

<body>

<div class="container">

<h1>Todo List</h1>
<p class="subtitle">Double click a task to edit it</p>

<div class="input-section">

<input
type="text"
id="todo-input"
placeholder="Enter a task..."

>

<button id="add-btn">
<i class="fa-solid fa-plus"></i>
</button>

</div>

<div class="filters">

<button class="filter-btn active" data-filter="all">All</button> <button class="filter-btn" data-filter="active">Active</button> <button class="filter-btn" data-filter="completed">Completed</button>

</div>

<ul id="todo-list"></ul>

<div class="footer">
<span id="task-count"></span>
</div>

</div>

<script src="script.js"></script>

</body>

</html>
